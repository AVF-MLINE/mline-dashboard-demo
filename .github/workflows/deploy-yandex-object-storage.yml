name: Deploy to Yandex Object Storage

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.YC_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ru-central1
      AWS_EC2_METADATA_DISABLED: "true"
      YC_BUCKET_NAME: ${{ secrets.YC_BUCKET_NAME }}
      YC_S3_ENDPOINT: https://storage.yandexcloud.net
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install AWS CLI
        run: python -m pip install --upgrade pip awscli

      - name: Configure AWS CLI for Yandex Object Storage
        run: |
          mkdir -p ~/.aws
          cat > ~/.aws/config <<EOF
          [default]
          region = ${AWS_DEFAULT_REGION}
          s3 =
            addressing_style = path
            signature_version = s3v4
          EOF

      - name: Sync static assets
        run: |
          aws s3 sync dist/ "s3://${YC_BUCKET_NAME}/" \
            --delete \
            --endpoint-url "${YC_S3_ENDPOINT}" \
            --cli-connect-timeout 60 \
            --cli-read-timeout 120 \
            --region "${AWS_DEFAULT_REGION}" \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable" \
            --no-progress

      - name: Upload index.html without cache
        run: |
          aws s3 cp dist/index.html "s3://${YC_BUCKET_NAME}/index.html" \
            --endpoint-url "${YC_S3_ENDPOINT}" \
            --cli-connect-timeout 60 \
            --cli-read-timeout 120 \
            --region "${AWS_DEFAULT_REGION}" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html; charset=utf-8" \
            --no-progress
